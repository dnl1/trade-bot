name: .NET

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # The ubuntu-latest runner ships with a stale Cloudflare apt source that
      # lacks a Release file, causing apt-get update to fail inside setup-dotnet.
      - name: Remove broken apt sources
        run: |
          sudo rm -f /etc/apt/sources.list.d/cloudflared.list
          sudo rm -f /etc/apt/sources.list.d/cloudflare*.list

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release
